<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 50" width="300" height="50">
  <g fill="none" stroke="#C9A84C" stroke-linecap="round" stroke-linejoin="round">

    <!--
      Counter-curve baroque style:
      LEFT side — main upper curve arches HIGH, lower arc dips LOW,
      both converge at the scroll terminal, creating a tapered-band effect.
    -->

    <!-- LEFT: main upper curve (sweeps high, ends in downward scroll) -->
    <path stroke-width="1.6"
      d="M 143,22
         C 115,12 80,5 52,7
         C 33,9 18,16 14,23
         C 11,30 15,36 22,37
         C 29,38 32,32 28,28"/>

    <!-- LEFT: counter lower arc (dips below centre, converges at scroll) -->
    <path stroke-width="1.0" opacity="0.72"
      d="M 141,26
         C 114,31 84,39 58,38
         C 44,37 34,33 28,28"/>

    <!-- RIGHT: main upper curve (mirror) -->
    <path stroke-width="1.6"
      d="M 157,22
         C 185,12 220,5 248,7
         C 267,9 282,16 286,23
         C 289,30 285,36 278,37
         C 271,38 268,32 272,28"/>

    <!-- RIGHT: counter lower arc (mirror) -->
    <path stroke-width="1.0" opacity="0.72"
      d="M 159,26
         C 186,31 216,39 242,38
         C 256,37 266,33 272,28"/>

  </g>

  <!-- CENTRAL ORNAMENT — taller to span both curves -->
  <g fill="#C9A84C">
    <!-- Upper flame -->
    <path d="M 150,7 C 153.5,8.5 155,13 150,17 C 145,13 146.5,8.5 150,7 Z"/>
    <!-- Diamond connector -->
    <path d="M 150,17 L 154,22 L 150,27 L 146,22 Z" opacity="0.9"/>
    <!-- Lower teardrop -->
    <path d="M 150,27 C 152.5,28.5 153,33 150,36 C 147,33 147.5,28.5 150,27 Z" opacity="0.85"/>
    <!-- Side accent dots at curve start points -->
    <circle cx="142" cy="23" r="1.2" opacity="0.55"/>
    <circle cx="158" cy="23" r="1.2" opacity="0.55"/>
  </g>
</svg>
