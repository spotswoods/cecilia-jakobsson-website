<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 30" width="240" height="30">
  <g fill="#C9A84C">

    <!-- Thin connecting lines -->
    <rect x="0" y="14.5" width="80" height="0.5" opacity="0.3"/>
    <rect x="160" y="14.5" width="80" height="0.5" opacity="0.3"/>

    <!-- Left outer leaf pair -->
    <ellipse cx="24" cy="10.5" rx="9.5" ry="3.2" transform="rotate(-22 24 10.5)" opacity="0.52"/>
    <ellipse cx="24" cy="18.5" rx="9.5" ry="3.2" transform="rotate(22 24 18.5)" opacity="0.52"/>

    <!-- Left inner leaf pair -->
    <ellipse cx="54" cy="11.2" rx="8" ry="2.7" transform="rotate(-18 54 11.2)" opacity="0.46"/>
    <ellipse cx="54" cy="17.8" rx="8" ry="2.7" transform="rotate(18 54 17.8)" opacity="0.46"/>

    <!-- Left stem dots -->
    <circle cx="8"  cy="14.5" r="1.3" opacity="0.32"/>
    <circle cx="68" cy="14.5" r="1.3" opacity="0.32"/>

    <!-- Central 8-petal rosette -->
    <!-- Cardinal petals -->
    <ellipse cx="120" cy="7.5"  rx="2.8" ry="6"   opacity="0.55"/>
    <ellipse cx="120" cy="21.5" rx="2.8" ry="6"   opacity="0.55"/>
    <ellipse cx="112" cy="14.5" rx="6"   ry="2.8"  opacity="0.55"/>
    <ellipse cx="128" cy="14.5" rx="6"   ry="2.8"  opacity="0.55"/>
    <!-- Diagonal petals -->
    <ellipse cx="114" cy="8.5"  rx="2.2" ry="4.8" transform="rotate(-45 114 8.5)"  opacity="0.4"/>
    <ellipse cx="126" cy="8.5"  rx="2.2" ry="4.8" transform="rotate(45 126 8.5)"   opacity="0.4"/>
    <ellipse cx="114" cy="20.5" rx="2.2" ry="4.8" transform="rotate(45 114 20.5)"  opacity="0.4"/>
    <ellipse cx="126" cy="20.5" rx="2.2" ry="4.8" transform="rotate(-45 126 20.5)" opacity="0.4"/>
    <!-- Centre -->
    <circle cx="120" cy="14.5" r="3.6" opacity="0.72"/>
    <circle cx="120" cy="14.5" r="1.4" fill="white" opacity="0.55"/>

    <!-- Right inner leaf pair (mirror) -->
    <ellipse cx="186" cy="11.2" rx="8"   ry="2.7" transform="rotate(18 186 11.2)"  opacity="0.46"/>
    <ellipse cx="186" cy="17.8" rx="8"   ry="2.7" transform="rotate(-18 186 17.8)" opacity="0.46"/>

    <!-- Right outer leaf pair (mirror) -->
    <ellipse cx="216" cy="10.5" rx="9.5" ry="3.2" transform="rotate(22 216 10.5)"  opacity="0.52"/>
    <ellipse cx="216" cy="18.5" rx="9.5" ry="3.2" transform="rotate(-22 216 18.5)" opacity="0.52"/>

    <!-- Right stem dots -->
    <circle cx="172" cy="14.5" r="1.3" opacity="0.32"/>
    <circle cx="232" cy="14.5" r="1.3" opacity="0.32"/>

  </g>
</svg>
