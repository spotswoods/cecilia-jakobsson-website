<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 44" width="300" height="44">
  <g fill="none" stroke="#C9A84C" stroke-linecap="round" stroke-linejoin="round">

    <!-- LEFT: main sweeping curve with end scroll -->
    <path stroke-width="1.5"
      d="M 143,22
         C 120,19 88,12 62,14
         C 44,15 30,19 24,24
         C 16,28 15,34 20,37
         C 25,40 32,38 33,33
         C 34,28 30,26 26,26"/>

    <!-- LEFT: inner secondary curve (shorter, no scroll) -->
    <path stroke-width="0.9" opacity="0.55"
      d="M 141,22
         C 116,21 90,18 70,18
         C 56,18 46,21 42,24"/>

    <!-- RIGHT: main sweeping curve with end scroll (mirror) -->
    <path stroke-width="1.5"
      d="M 157,22
         C 180,19 212,12 238,14
         C 256,15 270,19 276,24
         C 284,28 285,34 280,37
         C 275,40 268,38 267,33
         C 266,28 270,26 274,26"/>

    <!-- RIGHT: inner secondary curve (mirror) -->
    <path stroke-width="0.9" opacity="0.55"
      d="M 159,22
         C 184,21 210,18 230,18
         C 244,18 254,21 258,24"/>

  </g>

  <!-- CENTRAL ORNAMENT -->
  <g fill="#C9A84C">
    <!-- Upward flame / teardrop -->
    <path d="M 150,8 C 153.5,9.5 154.5,14 150,17 C 145.5,14 146.5,9.5 150,8 Z"/>
    <!-- Diamond connector -->
    <path d="M 150,17 L 153,21 L 150,25 L 147,21 Z" opacity="0.9"/>
    <!-- Lower teardrop -->
    <path d="M 150,25 C 152.5,26.5 153,30 150,32 C 147,30 147.5,26.5 150,25 Z" opacity="0.85"/>
    <!-- Side accent dots -->
    <circle cx="143" cy="22" r="1.1" opacity="0.55"/>
    <circle cx="157" cy="22" r="1.1" opacity="0.55"/>
  </g>
</svg>
